<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Space Invaders</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #wrap {
    text-align: center;
    color: #0f0;
    width: 100%;
    max-width: 600px;
    padding: 0 8px;
    box-sizing: border-box;
    touch-action: none;
  }
  .canvas-box {
    position: relative;
    width: 100%;
  }
  canvas {
    background: #000;
    border: 2px solid #0f0;
    image-rendering: pixelated;
    width: 100%;
    height: auto;
    display: block;
    touch-action: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin: 0 auto 6px;
    font-size: 18px;
    letter-spacing: 1px;
  }
  #msg {
    position: absolute;
    color: #0f0;
    font-size: 22px;
    text-align: center;
    width: 100%;
    top: 40%;
    pointer-events: none;
  }
  #hint {
    color: #0a0;
    font-size: 13px;
    margin-top: 6px;
  }
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    user-select: none;
    -webkit-user-select: none;
  }
  #controls .side {
    display: flex;
    gap: 10px;
  }
  .ctrl-btn {
    font-family: inherit;
    font-size: 26px;
    color: #0f0;
    background: #001a00;
    border: 2px solid #0f0;
    border-radius: 10px;
    width: 64px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.active {
    background: #0f0;
    color: #000;
  }
  #fireBtn {
    width: 96px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span id="score">SCORE: 0</span>
    <span id="level">LEVEL: 1</span>
    <span id="lives">LIVES: 3</span>
  </div>
  <div class="canvas-box">
    <canvas id="game" width="600" height="600"></canvas>
    <div id="msg"></div>
  </div>
  <div id="hint">ARROW KEYS / A-D to move &nbsp;•&nbsp; SPACE to shoot &nbsp;•&nbsp; P to pause</div>
  <div id="controls">
    <div class="side">
      <button class="ctrl-btn" id="leftBtn">&#9664;</button>
      <button class="ctrl-btn" id="rightBtn">&#9654;</button>
    </div>
    <button class="ctrl-btn" id="fireBtn">FIRE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
const msgEl = document.getElementById('msg');

const W = canvas.width, H = canvas.height;

// ---------- Audio ----------
let audioCtx = null;
let masterGain = null;
let bgGain = null;
let bgPlaying = false;
let bgTimer = null;

function ensureAudio() {
  if (!audioCtx) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(audioCtx.destination);

    bgGain = audioCtx.createGain();
    bgGain.gain.value = 0.04;
    bgGain.connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!bgPlaying) startBackgroundMusic();
}

function playTone(freq, duration, volume, type = 'square', startAt = 0, slide = 0, gainNode = masterGain) {
  if (!audioCtx || !gainNode) return;
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + startAt);
  if (slide) {
    oscillator.frequency.exponentialRampToValueAtTime(freq * slide, audioCtx.currentTime + startAt + duration);
  }
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + startAt);
  gain.gain.exponentialRampToValueAtTime(Math.max(volume, 0.0001), audioCtx.currentTime + startAt + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startAt + duration);
  oscillator.connect(gain);
  gain.connect(gainNode);
  oscillator.start(audioCtx.currentTime + startAt);
  oscillator.stop(audioCtx.currentTime + startAt + duration + 0.02);
}

function playNoise(duration, volume, gainNode = masterGain) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  source.buffer = buffer;
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  source.connect(gain);
  gain.connect(gainNode);
  source.start();
}

function playPlayerShot() {
  ensureAudio();
  playTone(880, 0.08, 0.04, 'square', 0, 1.08);
  playTone(660, 0.06, 0.03, 'triangle', 0.01);
}

function playEnemyLaser() {
  ensureAudio();
  playTone(220, 0.12, 0.035, 'sawtooth', 0, 0.9);
  playTone(180, 0.10, 0.02, 'triangle', 0.01);
}

function playFastShipSiren(phase = 0) {
  ensureAudio();
  const freq = phase === 0 ? 520 : 420;
  playTone(freq, 0.22, 0.03, 'sawtooth', 0, phase === 0 ? 0.92 : 1.08);
  playTone(freq * 0.75, 0.18, 0.02, 'triangle', 0.04, phase === 0 ? 0.95 : 1.05);
}

function playEnemyExplosion() {
  ensureAudio();
  playNoise(0.18, 0.04);
  playTone(150, 0.17, 0.035, 'sawtooth', 0, 0.7);
  playTone(90, 0.14, 0.025, 'triangle', 0.01, 0.5);
}

function playPlayerHit() {
  ensureAudio();
  playTone(220, 0.24, 0.03, 'triangle', 0, 0.8);
  playTone(180, 0.30, 0.02, 'sine', 0.01, 0.7);
}

function playGameOverMan() {
  ensureAudio();
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance('Game over man');
    utterance.rate = 0.9;
    utterance.pitch = 0.75;
    utterance.lang = 'en-US';
    speechSynthesis.speak(utterance);
  } else {
    playTone(110, 0.3, 0.03, 'sawtooth');
    playTone(90, 0.35, 0.025, 'triangle', 0.02);
  }
}

function startBackgroundMusic() {
  if (!audioCtx || bgPlaying) return;
  bgPlaying = true;
  const melody = [392, 440, 523, 587, 523, 440, 392, 349];
  let step = 0;
  const playNext = () => {
    if (!bgPlaying) return;
    const note = melody[step % melody.length];
    const duration = 0.28;
    playTone(note, duration, 0.012, 'triangle', 0, 1.02, bgGain);
    playTone(note * 1.5, duration * 0.75, 0.008, 'sine', 0.01, 1.03, bgGain);
    step++;
    bgTimer = window.setTimeout(playNext, duration * 1000 + 80);
  };
  playNext();
}

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') togglePause();
  if (e.code === 'Enter' && (state === 'gameover' || state === 'win')) resetGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// on-screen touch/mouse controls (for phones with no keyboard)
function bindButton(el, code) {
  const press = e => { e.preventDefault(); ensureAudio(); keys[code] = true; el.classList.add('active'); };
  const release = e => { e.preventDefault(); keys[code] = false; el.classList.remove('active'); };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', release);
  el.addEventListener('contextmenu', e => e.preventDefault());
}
bindButton(document.getElementById('leftBtn'), 'ArrowLeft');
bindButton(document.getElementById('rightBtn'), 'ArrowRight');
bindButton(document.getElementById('fireBtn'), 'Space');

canvas.addEventListener('pointerdown', () => {
  ensureAudio();
  if (state === 'gameover' || state === 'win') resetGame();
});

// ---------- Game State ----------
let state = 'playing'; // playing | paused | gameover | win
let score = 0;
let lives = 3;
let level = 1;

// ---------- Player ----------
const player = {
  w: 40, h: 18,
  x: W / 2 - 20,
  y: H - 40,
  speed: 5,
  cooldown: 0,
};

let playerBullets = [];
let enemyBullets = [];
let fastShip = null;
let fastShipLasers = [];
let initialInvaderCount = 0;
let destroyedInvaders = 0;
let fastShipSpawnedThisLevel = false;

// ---------- Invaders ----------
const ROWS = 5;
const COLS = 10;
const INV_W = 32, INV_H = 22;
const INV_PAD_X = 14, INV_PAD_Y = 16;
const GRID_LEFT = 60, GRID_TOP = 60;

let invaders = [];
let invaderDir = 1; // 1 = right, -1 = left
let invaderSpeed = 10; // px per step (horizontal)
let invaderStepDown = 18;
let invaderMoveTimer = 0;
let invaderMoveInterval = 45; // frames between steps, shrinks as invaders die

const ROW_COLORS = ['#ff3355', '#ffaa00', '#ffee00', '#33ff66', '#33ccff'];
const ROW_POINTS = [30, 20, 20, 10, 10];

function makeInvaders() {
  const arr = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      arr.push({
        row: r, col: c,
        x: GRID_LEFT + c * (INV_W + INV_PAD_X),
        y: GRID_TOP + r * (INV_H + INV_PAD_Y),
        alive: true,
      });
    }
  }
  return arr;
}

// ---------- Bunkers (shields) ----------
// Each bunker is a grid of small blocks that erode on hit.
const BUNKER_COUNT = 4;
const BLOCK = 4;
const BUNKER_COLS = 11;
const BUNKER_ROWS = 7;
let bunkers = [];

function makeBunkerShape() {
  // simple classic-ish bunker silhouette
  const shape = [];
  for (let r = 0; r < BUNKER_ROWS; r++) {
    const row = [];
    for (let c = 0; c < BUNKER_COLS; c++) {
      let alive = true;
      // notch out the bottom middle (the "arch")
      if (r >= BUNKER_ROWS - 3 && c >= 4 && c <= 6) alive = false;
      // round the top corners slightly
      if (r === 0 && (c === 0 || c === BUNKER_COLS - 1)) alive = false;
      row.push(alive ? { health: 3, burningUntil: 0 } : { health: 0, burningUntil: 0 });
    }
    shape.push(row);
  }
  return shape;
}

function makeBunkers() {
  const arr = [];
  const totalW = BUNKER_COLS * BLOCK;
  const spacing = (W - BUNKER_COUNT * totalW) / (BUNKER_COUNT + 1);
  for (let i = 0; i < BUNKER_COUNT; i++) {
    arr.push({
      x: spacing + i * (totalW + spacing),
      y: H - 140,
      blocks: makeBunkerShape(),
    });
  }
  return arr;
}

// ---------- Reset ----------
function resetGame() {
  ensureAudio();
  score = 0;
  lives = 3;
  level = 1;
  player.x = W / 2 - player.w / 2;
  playerBullets = [];
  enemyBullets = [];
  fastShip = null;
  fastShipLasers = [];
  initialInvaderCount = ROWS * COLS;
  destroyedInvaders = 0;
  fastShipSpawnedThisLevel = false;
  startLevel();
}

function startLevel() {
  invaders = makeInvaders();
  invaderDir = 1;
  invaderSpeed = 6 + level * 1.25;
  invaderMoveInterval = Math.max(10, 44 - level * 3);
  invaderMoveTimer = 0;
  bunkers = makeBunkers();
  fastShip = null;
  fastShipLasers = [];
  fastShipSpawnedThisLevel = false;
  player.x = W / 2 - player.w / 2;
  state = 'playing';
  msgEl.textContent = '';
  updateHud();
}

function makeFastShip() {
  return {
    x: -60,
    y: 220,
    w: 44,
    h: 18,
    dir: 1,
    speed: (5 + level * 0.8) * 0.7,
    hp: 3,
    targetBunker: BUNKER_COUNT - 1,
    hasFired: false,
    isFiring: false,
    fireStart: 0,
    sirenPhase: 0,
    sirenNext: 0,
  };
}

function showLevelBanner() {
  msgEl.textContent = 'LEVEL ' + level;
  window.setTimeout(() => {
    if (state === 'playing') msgEl.textContent = '';
  }, 900);
}

function updateHud() {
  scoreEl.textContent = 'SCORE: ' + score;
  levelEl.textContent = 'LEVEL: ' + level;
  livesEl.textContent = 'LIVES: ' + lives;
}

function togglePause() {
  if (state === 'playing') { state = 'paused'; msgEl.textContent = 'PAUSED'; }
  else if (state === 'paused') { state = 'playing'; msgEl.textContent = ''; }
}

// ---------- Update ----------
function aliveInvaders() {
  return invaders.filter(i => i.alive);
}

function update() {
  if (state !== 'playing') return;

  // player movement
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // shooting
  if (player.cooldown > 0) player.cooldown--;
  if (keys['Space'] && player.cooldown === 0) {
    playerBullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 12 });
    player.cooldown = 18;
    playPlayerShot();
  }

  const now = performance.now();

  // move player bullets
  playerBullets.forEach(b => b.y -= 9);
  playerBullets = playerBullets.filter(b => b.y + b.h > 0);

  // move enemy bullets
  enemyBullets.forEach(b => b.y += 5);
  enemyBullets = enemyBullets.filter(b => b.y < H);

  // fast ship movement and firing
  if (fastShip) {
    const targetBunker = bunkers[fastShip.targetBunker];
    const targetCenter = targetBunker ? targetBunker.x + (BUNKER_COLS * BLOCK) / 2 : W / 2;

    if (!fastShip.hasFired) {
      if (!fastShip.isFiring) {
        fastShip.x += fastShip.speed * fastShip.dir;
        if (fastShip.x + fastShip.w / 2 >= targetCenter - 8) {
          fastShip.isFiring = true;
          fastShip.fireStart = now;
          fastShip.x = targetCenter - fastShip.w / 2;
          const bunkerBottom = targetBunker ? targetBunker.y + BUNKER_ROWS * BLOCK : H;
          const targetCol = targetBunker
            ? Math.max(0, Math.min(BUNKER_COLS - 1, Math.floor((targetCenter - 2 - targetBunker.x) / BLOCK)))
            : 0;
          fastShipLasers = [{
            x: targetCenter - 2,
            y: fastShip.y + fastShip.h,
            w: 4,
            h: Math.max(0, bunkerBottom - (fastShip.y + fastShip.h) + 4),
            type: 'fastShipLaser',
            bunkerIndex: fastShip.targetBunker,
            targetCol,
            burnRow: 0,
            nextBurnAt: now,
            burnInterval: 700,
          }];
          startBunkerBurn(targetBunker, now);
          playEnemyLaser();
        }
      } else {
        // lock the fast ship in place while firing so the beam stays aimed at the bunker
        fastShip.x = targetCenter - fastShip.w / 2;
        const bunkerBottom = targetBunker ? targetBunker.y + BUNKER_ROWS * BLOCK : H;
        fastShipLasers.forEach(b => {
          b.y = fastShip.y + fastShip.h;
          b.h = Math.max(0, bunkerBottom - b.y);
          if (now >= b.nextBurnAt) {
            const col = b.targetCol != null ? b.targetCol : Math.floor((b.x - targetBunker.x) / BLOCK);
            if (targetBunker && col >= 0 && col < BUNKER_COLS && b.burnRow < BUNKER_ROWS) {
              const block = targetBunker.blocks[b.burnRow][col];
              if (block && block.health > 0) {
                startBunkerBurn(targetBunker, now);
              }
              b.burnRow++;
            }
            b.nextBurnAt = now + b.burnInterval;
          }
        });

        if (now - fastShip.fireStart >= 3000) {
          fastShip.hasFired = true;
          fastShip.isFiring = false;
          fastShipLasers = [];
        }
      }
    } else {
      fastShip.x += fastShip.speed * fastShip.dir;
      if (fastShip.x > W + fastShip.w) {
        fastShip = null;
      }
    }
  }

  // ensure the fast ship beam only extends to the target bunker bottom
  fastShipLasers = fastShipLasers.filter(b => {
    if (b.type !== 'fastShipLaser') return b.y < H + 220;
    const bunker = bunkers[b.bunkerIndex];
    if (!bunker) return false;
    const bunkerBottom = bunker.y + BUNKER_ROWS * BLOCK;
    b.h = Math.max(0, bunkerBottom - b.y);
    return b.y < bunkerBottom;
  });

  // invader movement (stepwise, classic style)
  const alive = aliveInvaders();
  if (alive.length > 0) {
    invaderMoveTimer++;
    if (invaderMoveTimer >= invaderMoveInterval) {
      invaderMoveTimer = 0;
      let minX = Math.min(...alive.map(i => i.x));
      let maxX = Math.max(...alive.map(i => i.x + INV_W));
      let hitEdge = (invaderDir === 1 && maxX + invaderSpeed >= W) ||
                    (invaderDir === -1 && minX - invaderSpeed <= 0);
      if (hitEdge) {
        invaders.forEach(i => { i.y += invaderStepDown; });
        invaderDir *= -1;
      } else {
        invaders.forEach(i => { i.x += invaderSpeed * invaderDir; });
      }
      // speed up as fewer remain
      invaderMoveInterval = Math.max(6, 8 + alive.length * 1.5);
    }

    // random enemy fire
    if (Math.random() < 0.02 + (1 - alive.length / (ROWS * COLS)) * 0.02) {
      const shooters = {};
      alive.forEach(i => {
        if (!shooters[i.col] || shooters[i.col].y < i.y) shooters[i.col] = i;
      });
      const cols = Object.values(shooters);
      const shooter = cols[Math.floor(Math.random() * cols.length)];
      if (shooter) {
        enemyBullets.push({ x: shooter.x + INV_W / 2 - 2, y: shooter.y + INV_H, w: 4, h: 12 });
        playEnemyLaser();
      }
    }

    if (!fastShip && !fastShipSpawnedThisLevel && destroyedInvaders >= Math.ceil(initialInvaderCount * 0.4)) {
      fastShip = makeFastShip();
      fastShipSpawnedThisLevel = true;
    }

    if (fastShip && now >= fastShip.sirenNext) {
      playFastShipSiren(fastShip.sirenPhase);
      fastShip.sirenPhase = (fastShip.sirenPhase + 1) % 2;
      fastShip.sirenNext = now + 320;
    }

    // check invaders reaching player line -> game over
    if (alive.some(i => i.y + INV_H >= player.y)) {
      endGame(false);
      return;
    }
  } else {
    if (level >= 5) {
      endGame(true);
    } else {
      level += 1;
      startLevel();
      showLevelBanner();
    }
    return;
  }

  // collisions: player bullets vs invaders
  playerBullets.forEach(b => {
    for (const inv of invaders) {
      if (!inv.alive) continue;
      if (rectsOverlap(b, { x: inv.x, y: inv.y, w: INV_W, h: INV_H })) {
        inv.alive = false;
        b.hit = true;
        destroyedInvaders++;
        playEnemyExplosion();
        score += ROW_POINTS[inv.row];
        updateHud();
        break;
      }
    }
  });
  playerBullets = playerBullets.filter(b => !b.hit);

  // collisions: player bullets vs fast ship
  playerBullets.forEach(b => {
    if (fastShip && rectsOverlap(b, fastShip)) {
      fastShip.hp--;
      b.hit = true;
      if (fastShip.hp <= 0) {
        fastShip = null;
        playEnemyExplosion();
        score += 500;
        updateHud();
      }
    }
  });
  playerBullets = playerBullets.filter(b => !b.hit);

  // collisions: bullets vs bunkers
  playerBullets.forEach(b => damageBunkers(b, now));
  enemyBullets.forEach(b => damageBunkers(b, now));
  fastShipLasers.forEach(b => damageBunkers(b, now));
  playerBullets = playerBullets.filter(b => !b.hit);
  enemyBullets = enemyBullets.filter(b => !b.hit);
  fastShipLasers = fastShipLasers.filter(b => !b.hit);

  // fire-only beams should persist through the bunker while burning it
  fastShipLasers.forEach(b => {
    if (b.type === 'fastShipLaser' && b.bunkerIndex != null) {
      const bunker = bunkers[b.bunkerIndex];
      if (!bunker) b.hit = true;
    }
  });

  // collisions: enemy bullets vs player
  enemyBullets.forEach(b => {
    if (rectsOverlap(b, player)) {
      b.hit = true;
      playerHit();
    }
  });
  enemyBullets = enemyBullets.filter(b => !b.hit);

  fastShipLasers = fastShipLasers.filter(b => !b.hit);
}

function startBunkerBurn(bunker, now) {
  if (!bunker || bunker.burnStart) return;
  bunker.burnStart = now;
  bunker.burnDuration = 5000;
}

function damageBunkers(bullet, now) {
  for (const bunker of bunkers) {
    for (let r = 0; r < BUNKER_ROWS; r++) {
      for (let c = 0; c < BUNKER_COLS; c++) {
        const block = bunker.blocks[r][c];
        if (!block || block.health <= 0) continue;
        const bx = bunker.x + c * BLOCK;
        const by = bunker.y + r * BLOCK;
        if (rectsOverlap(bullet, { x: bx, y: by, w: BLOCK, h: BLOCK })) {
          if (bullet.type === 'fastShipLaser') {
            startBunkerBurn(bunker, now);
          } else {
            block.health -= 1;
            bullet.hit = true;
            return;
          }
        }
      }
    }
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function playerHit() {
  lives--;
  playPlayerHit();
  updateHud();
  if (lives <= 0) {
    playGameOverMan();
    endGame(false);
  } else {
    player.x = W / 2 - player.w / 2;
  }
}

function endGame(won) {
  state = won ? 'win' : 'gameover';
  msgEl.innerHTML = won
    ? 'YOU WIN!<br><span style="font-size:14px">Press ENTER to play again</span>'
    : 'GAME OVER<br><span style="font-size:14px">Press ENTER to play again</span>';
}

// ---------- Draw ----------
function draw() {
  ctx.clearRect(0, 0, W, H);
  const now = performance.now();

  // player
  ctx.fillStyle = '#0f0';
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.fillRect(player.x + player.w / 2 - 4, player.y - 8, 8, 8);

  // fast ship
  if (fastShip) {
    ctx.fillStyle = '#ff4d6d';
    ctx.fillRect(fastShip.x + 8, fastShip.y + 4, fastShip.w - 16, 4);
    ctx.fillRect(fastShip.x + 4, fastShip.y + 8, fastShip.w - 8, 6);
    ctx.fillRect(fastShip.x, fastShip.y + 12, fastShip.w, 4);
    ctx.fillRect(fastShip.x + 10, fastShip.y + 2, 6, 4);
    ctx.fillRect(fastShip.x + fastShip.w - 16, fastShip.y + 2, 6, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(fastShip.x + fastShip.w / 2 - 2, fastShip.y + 2, 4, 6);
  }

  // fast ship lasers
  ctx.fillStyle = '#ff9f1c';
  fastShipLasers.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // player bullets
  ctx.fillStyle = '#fff';
  playerBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // enemy bullets
  ctx.fillStyle = '#ff0';
  enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // invaders
  invaders.forEach(inv => {
    if (!inv.alive) return;
    ctx.fillStyle = ROW_COLORS[inv.row];
    drawInvaderSprite(inv.x, inv.y);
  });

  // bunkers
  bunkers.forEach(bunker => {
    for (let r = 0; r < BUNKER_ROWS; r++) {
      for (let c = 0; c < BUNKER_COLS; c++) {
        const block = bunker.blocks[r][c];
        if (!block || block.health <= 0) continue;
        const burnActive = bunker.burnStart != null;
        if (burnActive) {
          const rowDelay = bunker.burnDuration / BUNKER_ROWS;
          const rowBurnStart = bunker.burnStart + r * rowDelay;
          const rowProgress = Math.min(1, Math.max(0, (now - rowBurnStart) / rowDelay));
          if (rowProgress >= 1) {
            block.health = 0;
            continue;
          }
          if (rowProgress > 0) {
            const glow = 4;
            const glowLeft = bunker.x + c * BLOCK - glow;
            const glowTop = bunker.y + r * BLOCK - glow;
            const glowSize = BLOCK + glow * 2;
            const yellowToRed = rowProgress <= 0.5
              ? `rgb(255, ${200 - Math.floor(rowProgress * 2 * 140)}, 0)`
              : `rgb(255, ${Math.floor(100 - (rowProgress - 0.5) * 200)}, 0)`;
            ctx.save();
            ctx.shadowColor = yellowToRed;
            ctx.shadowBlur = 12;
            ctx.fillStyle = yellowToRed;
            ctx.fillRect(glowLeft, glowTop, glowSize, glowSize);
            ctx.restore();
            ctx.fillStyle = yellowToRed;
            ctx.fillRect(bunker.x + c * BLOCK, bunker.y + r * BLOCK, BLOCK, BLOCK);
            continue;
          }
        }
        ctx.fillStyle = block.health === 1 ? '#5fe3ff' : '#0af';
        ctx.fillRect(bunker.x + c * BLOCK, bunker.y + r * BLOCK, BLOCK, BLOCK);
      }
    }
  });
}

function drawInvaderSprite(x, y) {
  // simple blocky "invader" body
  ctx.fillRect(x + 4, y, INV_W - 8, 4);
  ctx.fillRect(x + 8, y + 4, INV_W - 16, 4);
  ctx.fillRect(x, y + 8, INV_W, 6);
  ctx.fillRect(x + 4, y + 14, 6, 4);
  ctx.fillRect(x + INV_W - 10, y + 14, 6, 4);
  ctx.fillRect(x + 2, y + 18, 4, 4);
  ctx.fillRect(x + INV_W - 6, y + 18, 4, 4);
}

// ---------- Loop ----------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();
</script>
